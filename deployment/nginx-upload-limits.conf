# Incluir dentro del bloque `server { ... }` o `http { ... }` del virtual host que sirve la app,
# o en el `location` que hace proxy a PHP. Ajustar el valor si subes max: en Form Requests.
#
# Sin esto, Nginx puede responder 413 Request Entity Too Large aunque PHP esté bien configurado.

client_max_body_size 32m;
