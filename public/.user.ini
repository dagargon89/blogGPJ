; Documentos/infografías: hasta 20 MB por archivo (alineado con la validación Laravel).
; post_max_size mayor para permitir portada (~5 MB) + documento en la misma petición.
; Con Nginx, ajusta también client_max_body_size (p. ej. 32m); ver deployment/nginx-upload-limits.conf.
; Para PHP-FPM/self-hosted, ver deployment/php-upload-limits.ini.
upload_max_filesize = 20M
post_max_size = 32M
